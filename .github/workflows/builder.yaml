name: Builder
permissions:
  contents: read
  pull-requests: write
env:
  MONITORED_FILES: "build.yaml config.yaml Dockerfile rootfs GridboxConnectorAddon GridboxConnectorAddon-dev GridboxConnectorAddon-edge"
  LOGFIRE_TOKEN_EDGE: ${{ secrets.LOGFIRE_TOKEN_EDGE }}

on:
  push:
    tags:
      - "v*"

  pull_request:
    branches:
      - main

jobs:
  init:
    runs-on: ubuntu-latest
    name: Initialize builds
    outputs:
      changed_addons: ${{ steps.changed_addons.outputs.addons }}
      changed: ${{ steps.changed_addons.outputs.changed }}
    steps:
      - name: Check out the repository
        uses: actions/checkout@v6

      - name: Determine add-ons to build
        id: changed_addons
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            # Tag event: determine addon from tag name
            TAG="${{ github.ref_name }}"
            if [[ "$TAG" == *"-edge" ]]; then
              ADDON="GridboxConnectorAddon-edge"
            elif [[ "$TAG" == *"-dev" ]]; then
              ADDON="GridboxConnectorAddon-dev"
            else
              ADDON="GridboxConnectorAddon"
            fi
            echo "Tag ${TAG} → building ${ADDON}";
            echo "changed=true" >> $GITHUB_OUTPUT;
            echo "addons=[\"${ADDON}\"]" >> $GITHUB_OUTPUT;
          else
            # PR event: detect changed addon directories
            declare -a changed_addons
            for addon in GridboxConnectorAddon-edge GridboxConnectorAddon-dev GridboxConnectorAddon; do
              if git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -q "^${addon}/"; then
                changed_addons+=("\"${addon}\"");
              fi
            done
            if [ ${#changed_addons[@]} -eq 0 ]; then
              echo "No add-on directories changed";
              echo "changed=false" >> $GITHUB_OUTPUT;
              echo "addons=[]" >> $GITHUB_OUTPUT;
            else
              changed=$(IFS=,; echo "${changed_addons[*]}")
              echo "Changed add-ons: $changed";
              echo "changed=true" >> $GITHUB_OUTPUT;
              echo "addons=[$changed]" >> $GITHUB_OUTPUT;
            fi
          fi

  build:
    needs: init
    runs-on: ubuntu-latest
    if: needs.init.outputs.changed == 'true'
    name: Build ${{ matrix.arch }} ${{ matrix.addon }} add-on
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        addon: ${{ fromJson(needs.init.outputs.changed_addons) }}
        arch: ["aarch64", "amd64"]
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Get information
        id: info
        uses: home-assistant/actions/helpers/info@master
        with:
          path: "./${{ matrix.addon }}"

      - name: Check if add-on should be built
        id: check
        run: |
          if [[ "${{ steps.info.outputs.architectures }}" =~ ${{ matrix.arch }} ]]; then
            echo "build_arch=true" >> $GITHUB_OUTPUT;

            # Construct full image name with arch substituted
            IMAGE_FULL="${{ steps.info.outputs.image }}"
            IMAGE_FULL="${IMAGE_FULL//\{arch\}/${{ matrix.arch }}}"
            echo "image=${IMAGE_FULL}" >> $GITHUB_OUTPUT;

            if [[ "${{ github.event_name }}" == "push" ]] && [[ "${{ github.ref }}" == refs/tags/* ]]; then
              echo "push=true" >> $GITHUB_OUTPUT;
            else
              echo "push=false" >> $GITHUB_OUTPUT;
            fi
          else
            echo "${{ matrix.arch }} is not a valid arch for ${{ matrix.addon }}, skipping build";
            echo "build_arch=false" >> $GITHUB_OUTPUT;
            echo "push=false" >> $GITHUB_OUTPUT;
          fi

      - name: Get build configuration
        id: config
        if: steps.check.outputs.build_arch == 'true'
        run: |
          echo "version=$(yq '.version' ./${{ matrix.addon }}/config.yaml)" >> $GITHUB_OUTPUT
          echo "build_from=$(yq '.build_from.${{ matrix.arch }}' ./${{ matrix.addon }}/build.yaml)" >> $GITHUB_OUTPUT
          echo "tempio=$(yq '.args.TEMPIO_VERSION' ./${{ matrix.addon }}/build.yaml)" >> $GITHUB_OUTPUT
          {
            echo "labels<<EOF"
            yq '.labels | to_entries[] | .key + "=" + .value' ./${{ matrix.addon }}/build.yaml
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Set up Python
        uses: actions/setup-python@v6
        if: steps.check.outputs.push == 'true'
        with:
          python-version: "3.12"

      - name: Install dependencies
        if: steps.check.outputs.push == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -r ./${{ matrix.addon }}/GridboxConnector/requirements.txt

      - name: Run tests
        if: steps.check.outputs.push == 'true'
        run: |
          cd ./${{ matrix.addon }}/GridboxConnector
          pytest tests/ --cov=. --cov-report=xml:coverage.xml --cov-report=term-missing 2>&1 | tee pytest-output.txt

      - name: Write coverage summary
        if: steps.check.outputs.push == 'true'
        run: |
          echo "## 🧪 Test Coverage – ${{ matrix.addon }} (${{ matrix.arch }})" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          awk '/^Name/{p=1} p{print} /^TOTAL/{p=0}' ./${{ matrix.addon }}/GridboxConnector/pytest-output.txt >> $GITHUB_STEP_SUMMARY || true
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Get Cover
        uses: orgoro/coverage@v3.2
        if: steps.check.outputs.push == 'true' && github.event_name == 'pull_request'
        with:
          coverageFile: ./${{ matrix.addon }}/GridboxConnector/coverage.xml
          token: ${{ secrets.TOKEN }}

      - name: Build ${{ matrix.addon }} add-on
        if: steps.check.outputs.build_arch == 'true'
        uses: home-assistant/builder/actions/build-image@2026.03.2
        with:
          arch: ${{ matrix.arch }}
          image: ${{ steps.check.outputs.image }}
          image-tags: |
            ${{ steps.config.outputs.version }}
            latest
          version: ${{ steps.config.outputs.version }}
          context: ./${{ matrix.addon }}
          push: ${{ steps.check.outputs.push }}
          container-registry-password: ${{ secrets.TOKEN }}
          cosign: "false"
          build-args: |
            BUILD_FROM=${{ steps.config.outputs.build_from }}
            BUILD_ARCH=${{ matrix.arch }}
            BUILD_VERSION=${{ steps.config.outputs.version }}
            BUILD_REPOSITORY=${{ github.repository }}
            BUILD_REF=${{ github.sha }}
            TEMPIO_VERSION=${{ steps.config.outputs.tempio }}
          labels: ${{ steps.config.outputs.labels }}
        env:
          LOGFIRE_TOKEN: ${{ secrets.LOGFIRE_TOKEN }}

