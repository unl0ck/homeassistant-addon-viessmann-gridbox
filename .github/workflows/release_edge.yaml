name: Release Edge
permissions:
  contents: read
  pull-requests: write
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version bump type"
        required: true
        type: choice
        default: "patch"
        options:
          - major
          - minor
          - patch

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r GridboxConnectorAddon-edge/GridboxConnector/requirements.txt

      - name: Run tests
        run: |
          cd GridboxConnectorAddon-edge/GridboxConnector
          PYTHONPATH=. pytest tests/ --cov=. --cov-report=term-missing 2>&1 | tee pytest-output.txt

      - name: Write coverage summary
        run: |
          echo "## 🧪 Test Coverage – GridboxConnectorAddon-edge" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          awk '/^Name/{p=1} p{print} /^TOTAL/{p=0}' GridboxConnectorAddon-edge/GridboxConnector/pytest-output.txt >> $GITHUB_STEP_SUMMARY || true
          echo '```' >> $GITHUB_STEP_SUMMARY

      - run: pip install bump-my-version

      - name: Bump Version
        run: bump-my-version bump ${{ github.event.inputs.version }} --config-file .bumpversion-edge.toml

      - name: Get Current Version
        run: |
          echo "CURRENT_VERSION=$(bump-my-version show --config-file .bumpversion-edge.toml current_version)" >> $GITHUB_ENV

      - name: Generate Changelog
        run: |
          LAST_TAG=$(git describe --tags --match "v*-edge" --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LAST_TAG" ]; then
            COMMITS=$(git log --no-merges --format="- %s" | head -50)
          else
            COMMITS=$(git log "${LAST_TAG}..HEAD" --no-merges --format="- %s")
          fi

          CHANGELOG_FILE="GridboxConnectorAddon-edge/CHANGELOG.md"
          NEW_ENTRY="## ${{ env.CURRENT_VERSION }}-edge\n### 🔄 Changes\n${COMMITS}\n"

          if [ -f "$CHANGELOG_FILE" ]; then
            echo -e "${NEW_ENTRY}\n$(cat $CHANGELOG_FILE)" > "$CHANGELOG_FILE"
          else
            echo -e "${NEW_ENTRY}" > "$CHANGELOG_FILE"
          fi

      - name: Commit Edge Release
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "release: Release Edge Version v${{ env.CURRENT_VERSION }}-edge"
          git tag -a "v${{ env.CURRENT_VERSION }}-edge" -m "v${{ env.CURRENT_VERSION }}-edge"
          git push --follow-tags
