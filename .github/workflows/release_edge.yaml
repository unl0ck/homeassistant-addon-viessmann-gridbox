name: Release Edge
permissions:
  contents: read
  pull-requests: write
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version bump type"
        required: true
        type: choice
        default: "patch"
        options:
          - major
          - minor
          - patch

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6

      - run: pip install bump-my-version

      - name: Bump Version
        run: bump-my-version bump ${{ github.event.inputs.version }} --config-file .bumpversion-edge.toml

      - name: Get Current Version
        run: |
          echo "CURRENT_VERSION=$(bump-my-version show --config-file .bumpversion-edge.toml current_version)" >> $GITHUB_ENV

      - name: Generate Changelog
        run: |
          LAST_TAG=$(git describe --tags --match "v*-edge" --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LAST_TAG" ]; then
            COMMITS=$(git log --no-merges --format="- %s" | head -50)
          else
            COMMITS=$(git log "${LAST_TAG}..HEAD" --no-merges --format="- %s")
          fi

          CHANGELOG_FILE="GridboxConnectorAddon-edge/CHANGELOG.md"
          NEW_ENTRY="## ${{ env.CURRENT_VERSION }}-edge\n### 🔄 Changes\n${COMMITS}\n"

          if [ -f "$CHANGELOG_FILE" ]; then
            echo -e "${NEW_ENTRY}\n$(cat $CHANGELOG_FILE)" > "$CHANGELOG_FILE"
          else
            echo -e "${NEW_ENTRY}" > "$CHANGELOG_FILE"
          fi

      - name: Commit Edge Release
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          token: ${{ secrets.TOKEN }}
          tagging_message: "v${{ env.CURRENT_VERSION }}-edge"
          commit_message: "release: Release Edge Version v${{ env.CURRENT_VERSION }}-edge"
