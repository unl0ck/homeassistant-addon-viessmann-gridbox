name: Push Docker Image for Standalone
permissions:
  contents: read
  pull-requests: write
on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    if: ${{ !endsWith(github.ref_name, '-edge') && !endsWith(github.ref_name, '-dev') }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          platforms: linux/amd64,linux/arm64

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          file: ./GridboxConnectorAddon/Dockerfile.standalone
          push: true
          tags: ghcr.io/${{ github.repository }}/standalone-viessman-gridbox-connector:latest
          platforms: linux/amd64,linux/arm64
