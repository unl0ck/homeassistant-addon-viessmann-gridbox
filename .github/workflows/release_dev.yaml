name: Release Dev
permissions:
  contents: read
  pull-requests: write
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Copy Release
        run: ./copy_to_dev.sh

      - name: Set up Python
        uses: actions/setup-python@v6

      - run: pip install bump-my-version

      - name: Get Current Version
        run: |
          echo "CURRENT_VERSION=$(bump-my-version show --config-file .bumpversion-dev.toml current_version)" >> $GITHUB_ENV

      - name: Generate Changelog
        run: |
          LAST_TAG=$(git describe --tags --match "v*-dev" --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LAST_TAG" ]; then
            COMMITS=$(git log --no-merges --format="- %s" | head -50)
          else
            COMMITS=$(git log "${LAST_TAG}..HEAD" --no-merges --format="- %s")
          fi

          CHANGELOG_FILE="GridboxConnectorAddon-dev/CHANGELOG.md"
          NEW_ENTRY="## ${{ env.CURRENT_VERSION }}-dev\n### 🔄 Changes\n${COMMITS}\n"

          if [ -f "$CHANGELOG_FILE" ]; then
            echo -e "${NEW_ENTRY}\n$(cat $CHANGELOG_FILE)" > "$CHANGELOG_FILE"
          else
            echo -e "${NEW_ENTRY}" > "$CHANGELOG_FILE"
          fi

      - name: Commit Stable
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          tagging_message: "v${{ env.CURRENT_VERSION }}-dev"
          commit_message: "release: Release Dev Version v${{ env.CURRENT_VERSION }}-dev"
