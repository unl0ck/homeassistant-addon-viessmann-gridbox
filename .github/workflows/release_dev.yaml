name: Release Dev
permissions:
  contents: read
  pull-requests: write
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Copy Release
        run: ./copy_to_dev.sh

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r GridboxConnectorAddon-dev/GridboxConnector/requirements.txt

      - name: Run tests
        run: |
          cd GridboxConnectorAddon-dev/GridboxConnector
          pytest tests/ --cov=. --cov-report=term-missing 2>&1 | tee pytest-output.txt

      - name: Write coverage summary
        run: |
          echo "## 🧪 Test Coverage – GridboxConnectorAddon-dev" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          awk '/^Name/{p=1} p{print} /^TOTAL/{p=0}' GridboxConnectorAddon-dev/GridboxConnector/pytest-output.txt >> $GITHUB_STEP_SUMMARY || true
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Get Current Version
        run: |
          NEW_VERSION=$(yq '.version' GridboxConnectorAddon-dev/config.yaml)
          echo "CURRENT_VERSION=${NEW_VERSION}" >> $GITHUB_ENV
          sed -i "s/^current_version = .*/current_version = \"${NEW_VERSION}\"/" .bumpversion-dev.toml

      - name: Generate Changelog
        run: |
          LAST_TAG=$(git describe --tags --match "v*-dev" --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LAST_TAG" ]; then
            COMMITS=$(git log --no-merges --format="- %s" | head -50)
          else
            COMMITS=$(git log "${LAST_TAG}..HEAD" --no-merges --format="- %s")
          fi

          CHANGELOG_FILE="GridboxConnectorAddon-dev/CHANGELOG.md"
          NEW_ENTRY="## ${{ env.CURRENT_VERSION }}-dev\n### 🔄 Changes\n${COMMITS}\n"

          if [ -f "$CHANGELOG_FILE" ]; then
            echo -e "${NEW_ENTRY}\n$(cat $CHANGELOG_FILE)" > "$CHANGELOG_FILE"
          else
            echo -e "${NEW_ENTRY}" > "$CHANGELOG_FILE"
          fi

      - name: Commit Stable
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          tagging_message: "v${{ env.CURRENT_VERSION }}-dev"
          commit_message: "release: Release Dev Version v${{ env.CURRENT_VERSION }}-dev"
